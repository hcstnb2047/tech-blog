# =============================================================================
# Gitleaks 設定 — 公開技術ブログの秘密 / PII / 健康情報ゲート
#
# 走査対象について:
#   Gitleaks はコミットされた「ファイル内容そのもの」を走査するため、記事の
#   frontmatter だけでなく Markdown 本文(body)・コメント・コード片もすべて対象になる。
#   個人情報・健康語彙は本文に紛れ込みやすいので、本文走査前提でルールを置く。
#
# 二段構え:
#   - frontmatter は content.config.ts の Zod strict スキーマで未知キーを拒否（ビルド失敗）。
#   - 本文を含む全文は本ファイル（Gitleaks）で語彙ベース検出（CI 失敗）。
# =============================================================================

# デフォルトルール（APIキー・トークン・秘密鍵など汎用シークレット）を有効化。
[extend]
useDefault = true

# -----------------------------------------------------------------------------
# カスタム denylist: 日本語の健康 / 個人情報語彙
# これらは公開ブログに載ってはいけない。検出されたら CI を失敗させて公開を止める。
# -----------------------------------------------------------------------------

[[rules]]
id = "jp-health-mental-terms"
description = "日本語の健康/精神医療語彙（公開禁止）"
# 双極症・服薬・通院・希死念慮など。frontmatter / 本文どちらでも検出する。
regex = '''(双極症|双極性障害|躁うつ|躁転|炭酸リチウム|リチウム|希死念慮|自殺念慮|希死|通院|診断|投薬|処方|主治医|精神科|心療内科|抗うつ|睡眠制限療法|障害者手帳|精神障害者保健福祉手帳)'''
tags = ["pii", "health", "ja"]

[[rules]]
id = "jp-mood-log-marker"
description = "気分ログ由来のマーカー（life-data 由来の混入検出）"
# 例: "mood 3" / "気分3" / "M/D (mood)" 形式の記録が記事に混入していないか。
regex = '''(気分[ ]?[1-5]\b|\bmood[ ]?[1-5]\b|M/D[ ]?\(mood\))'''
tags = ["pii", "health", "ja", "lifelog"]

[[rules]]
id = "jp-fullname-honorific"
description = "氏名らしき固有名詞（敬称付き・公開前に要確認）"
# 漢字氏名 + 敬称（さん/様/氏/くん/ちゃん）。誤検知し得るため allowlist で個別に許可する運用。
regex = '''[一-龯々]{2,4}[ 　]?(さん|様|氏|くん|ちゃん)'''
tags = ["pii", "name", "ja"]

[[rules]]
id = "jp-private-contact"
description = "個人連絡先（メール/電話番号）"
regex = '''([A-Za-z0-9._%+-]+@(gmail|icloud|outlook|yahoo)\.(com|co\.jp|ne\.jp)|0\d{1,3}-?\d{2,4}-?\d{4})'''
tags = ["pii", "contact"]

# -----------------------------------------------------------------------------
# allowlist（誤検知の個別許可）
#
# 運用注記（重要）:
#   - ここに追加する各エントリには【根拠コメント】と【TTL（見直し期限 / 失効日）】を
#     必ず併記すること。恒久 allowlist は禁止（denylist の形骸化を防ぐ）。
#   - 例外を足すときは「なぜ安全か」を 1 行で残し、期限が来たら再評価して削除する。
#   - regexes / paths / stopwords / commits を用途に応じて使い分ける。
#
[allowlist]
  description = "誤検知の個別許可（各エントリに根拠と TTL を必須記載・恒久 allowlist は禁止）"
  # 注意: 記事ディレクトリ src/content/articles/ は絶対に allowlist しない（ゲートの本体）。
  # 以下は「インフラ自身が検出語彙を含む」ことによる自己マッチ回避のみに限定する。
  paths = [
    # 根拠: 本ファイル自体が検出語彙を正規表現として含むため自己マッチする / TTL: 2026-12-31 再評価
    '''\.gitleaks\.toml''',
    # 根拠: Zod スキーマのコメントに「除外すべき健康語彙の例」を記載しているため / TTL: 2026-12-31 再評価
    '''src/content\.config\.ts''',
  ]
  # regexes 例（技術用語の誤検知許可。必要時のみ有効化・根拠+TTL必須）:
  #   '''リチウムイオン''',   # 根拠: 電池の技術用語で健康語彙でない / TTL: 2026-12-31
# -----------------------------------------------------------------------------
